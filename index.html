<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Xelua</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="logo">Xelua</div>
    <a class="btn" href="#">Download</a>
  </header>

  <main class="hero">
    <h1>
      新時代の<br />
      <span>日本製マップ</span>
    </h1>
    <p>
      Xeluaは、最高クオリティのマップ体験を提供します。
    </p>
    <a class="btn big" href="#">Get Started</a>
  </main>

  <section class="features">
    <h2>
      最高級の <span>クオリティ</span>
    </h2>
    <p class="features-sub">
      最高クオリティのマップ体験。<br />
      どんな日本製マップにも、決して負けない。
    </p>

    <div class="feature-grid">
      <div class="card">
        <h3>見やすいUI</h3>
        <p>
          細部まで徹底的に作り込まれたボタンとフレーム。
          一目で違いが分かる、圧倒的な見やすさ。
        </p>
      </div>

      <div class="card">
        <h3>最適化されたパフォーマンス</h3>
        <p>
          高品質でありながら軽量設計。
          安定したパフォーマンスを常に維持。
        </p>
      </div>

      <div class="card">
        <h3>管理者乱用の防止</h3>
        <p>
          ユーザーの体験を邪魔する乱用者を
          絶対に作りだしません。
        </p>
      </div>
    </div>
  </section>

  <div class="glow left"></div>
  <div class="glow right"></div>
<div class="snow snow-1"></div>
<div class="snow snow-2"></div>
<div class="snow snow-3"></div>


</body>
</html>
